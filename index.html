<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alandar Pokédex</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">Pokémon Alandar Database</div>
    <nav>
      <button data-view="national" class="nav-btn active">National Dex</button>
      <button data-view="alandar" class="nav-btn">Alandar Dex</button>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Alandar Pokédex</h1>
      <p>Simple RP database for Pokémon typing, evolutions, abilities, and rank based moves.</p>
      <input id="search" type="search" placeholder="Search Pokémon..." />
    </section>

    <section id="dex-view" class="dex-grid"></section>
    <section id="pokemon-view" class="pokemon-view hidden"></section>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
